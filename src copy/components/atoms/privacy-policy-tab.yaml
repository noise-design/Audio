authored_metadata: |
  component:
    id: privacy-policy-tab
    name: Privacy policy tab
    type: atom


    purpose: >
      A standalone entry point to the privacy policy, terms & conditions, and app
      version.


    usage: >
      Used to give the user access to the privacy policy, terms & conditions, and
      to see the app version — typically on the settings page.


    design_intent: >
      Provide a consistent, self-contained footer-style block for legal links and
      app version, so this information appears uniformly wherever it's placed.


    anti_patterns:
      - id: no-splitting
        rule: >
          Do not split up its parts or use them individually; it is a single fixed
          unit.


    composition:
      embedded:
        - name: Privacy Policy link
        - name: Terms & Conditions link
        - name: App Version label
      note: All parts are embedded/self-contained; no child components.


    rules:
      - id: fixed-structure
        rule: >
          Fixed three-part structure: Privacy Policy, Terms & Conditions, and App
          Version. All three are always present.
      - id: app-version-static
        rule: The App Version is a static label.


