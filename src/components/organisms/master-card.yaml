authored_metadata: |
  component:
    id: master-card
    name: Master card
    type: organism
    reusable: true
    standalone: true


    usage: >
      This is the master card used in the majority of table cell use cases.
      Can be used as a standalone card or as a row within a grouped list.


    design_intent: >
      Provide a flexible row pattern that supports both standalone surfaces and
      grouped lists while maintaining consistent content hierarchy and
      interaction patterns.


    anti_patterns:
      - id: no-dual-corner-radius
        rule: >
          Do not apply both row-level and container-level corner radius
          simultaneously.
      - id: no-standalone-when-grouped
        rule: >
          Do not use standalone cards when multiple related items should be
          grouped.
      - id: grouped-list-requires-separators
        rule: >
          Do not use grouped-list mode without enabling separator lines between
          rows.
      - id: single-primary-actionable-per-row
        rule: >
          Do not place more than one primary actionable in a row.
      - id: notification-chin-standalone-only
        rule: >
          Notification chin can only be used with a standalone card.
      - id: no-separator-with-standalone-or-chin
        rule: >
          Do not add a separator line to a standalone card or a card with a
          notification chin.
      - id: no-stroke
        rule: >
          Do not add a stroke to the component regardless of it being a
          standalone component or a table cell component.


    composition:
      used_molecules:
        - actionables
      used_atoms:
        - heading-content-component


    content_structure:
      - name: Leading Icon
        required: false
      - name: Title
        required: true
      - name: Description
        required: false
      - name: Notification Chin
        required: false
        constraint: Only available in standalone card mode.
      - name: Trailing Actionable
        required: false
        options:
          - Chevron
          - Toggle
          - Checkbox
          - Cross
          - Badge


    rules:
      - id: single-primary-actionable
        rule: Only one primary actionable per row.
      - id: actionables-right-aligned
        rule: Actionables always remain right aligned.
      - id: actionable-replacement-no-layout-shift
        rule: Replacing an actionable must not affect content layout.
      - id: actionables-inherit-vertical-alignment
        rule: Actionables inherit the component's vertical alignment.
      - id: no-checkbox-in-this-component
        rule: >
          Never add a checkbox in this component even though it is in the
          actionables.
      - id: separator-inset
        rule: >
          The separator line between rows is inset, not full-width. It begins at
          the start of the text/content block (aligned after the leading icon)
          and runs to the trailing edge. It must never extend under the leading
          icon. Applies only in grouped-list mode.


    visual_properties:
      source: figma_mcp
      note: >
        Exact values (corner radius, padding, width, colors) are not stored here.
        They are read live from Figma via MCP at consumption time.
