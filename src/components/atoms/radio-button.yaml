authored_metadata: |
  component:
    id: radio-button
    name: Radio Button
    type: atom


    usage: >
      Used for mutually exclusive choices where only one option can be selected
      at a time.


    design_intent: >
      Allow users to choose one option from a predefined set of alternatives.


    anti_patterns:
      - id: not-for-navigation
        rule: Do not use for navigation.
      - id: not-for-multiple-selection
        rule: Do not use for multiple selection.
      - id: not-for-immediate-system-toggles
        rule: Do not use for immediate system toggles.


    states:
      - selected
      - unselected
      - disabled


    rules:
      - id: single-selection-per-group
        rule: Only one radio button may be selected within a group.
      - id: new-selection-deselects-previous
        rule: Selecting a new option deselects the previous option.


    visual_properties:
      source: figma_mcp
      note: >
        Exact values (corner radius, padding, width, colors) are not stored here.
        They are read live from Figma via MCP at consumption time.
