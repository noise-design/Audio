authored_metadata: |
  component:
    id: checkbox
    name: Checkbox
    type: atom


    usage: >
      Used for independent selections where multiple options may be selected
      simultaneously.


    design_intent: >
      Enable independent selection without affecting other available options.


    anti_patterns:
      - id: not-for-navigation
        rule: Do not use for navigation.
      - id: not-for-mutually-exclusive
        rule: Do not use for mutually exclusive choices.
      - id: not-for-system-settings
        rule: Do not use for system settings.


    states:
      - selected
      - not-selected
      - disabled


    rules:
      - id: multiple-selection-per-group
        rule: Multiple checkboxes may be selected within the same group.
      - id: selection-state-always-visible
        rule: Selection state must remain visible at all times.


