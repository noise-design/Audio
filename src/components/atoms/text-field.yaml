authored_metadata: |
  component:
    id: text-field
    name: Text field
    type: atom


    purpose: >
      A field where the user enters values or data, with a fixed set of variants
      for different input cases.


    usage: >
      Used wherever the user inputs data. The agent picks the variant matching
      the input case. Except for the Noise AI variant, a Text field is always
      paired with a Card heading above it.


    anti_patterns:
      - id: no-field-without-heading
        rule: >
          Do not use a Text field (except the Noise AI variant) without its
          paired Card heading.
      - id: no-invented-variants
        rule: Do not invent new variants; the set is fixed.


    composition:
      used_atoms:
        - chevron
      note: >
        The Bold variant's chevron is the Chevron atom, referenced directly (not
        the Actionables molecule). All other content is embedded/self-contained.


    variants:
      locked: true
      values:
        - name: small
          description: >
            Small text field. Trailing bottom-right character count (e.g. "0/50"),
            toggleable.
        - name: big
          description: >
            Large text field. Trailing bottom-right character count (e.g. "0/300"),
            toggleable.
        - name: bold
          description: Bold-styled field with a trailing chevron (Chevron atom).
          uses_atom: chevron
        - name: file-upload
          description: Shows the uploaded file with its title and a copy affordance.
        - name: otp
          description: >
            Four value slots; supports a valid/invalid state and an option to
            listen to the OTP (see OTP behavior).
        - name: noise-ai-text-field
          description: The AI prompt field ("Ask Anything").
          exempt_from_heading_pairing: true


    toggles:
      character_count:
        applies_to: [small, big]
        states: [on, off]
        note: The bottom-right letter count toggles on/off per requirement.
      otp_lower_block:
        applies_to: [otp]
        states: [on, off]
        numerical:
          states: [on, off]
          note: >
            Within the lower block, the numerical toggles individually on/off
            depending on the OTP state.


    rules:
      pairing:
        - >
          All variants except the Noise AI text field are always used with a Card
          heading placed above them. The gap between the heading and the field is
          exactly 8px, referencing space.numeral.s (= 8).
      otp_behavior:
        - >
          If the entered OTP is invalid, the timer is not shown; the failed state
          is displayed (e.g. "Incorrect OTP entered.").
        - >
          If the user wants to listen to the OTP and has entered nothing, the
          resend-OTP state with the timer is shown (the usual resend flow).
        - >
          The failed OTP state and the resend OTP state are the two mutually
          exclusive states of the lower block.
      variant_scope:
        - Character count is available only on the Small and Big variants.
        - >
          The Bold variant's chevron is the Chevron atom, referenced directly
          (not via the Actionables molecule).
        - >
          The variant set is fixed; the agent selects among them but never creates
          new ones.


    relationships:
      - component_id: card-heading
        relation: paired-with
        description: >
          A Text field (except the Noise AI variant) is always paired with a Card
          heading above it, at an 8px gap (space.numeral.s).
      - component_id: chevron
        relation: uses
        description: Used directly by the Bold variant as its trailing chevron.


    visual_properties:
      source: figma_mcp
      note: >
        Exact values (typography, spacing, colors, dimensions) are not stored
        here. They are read live from Figma via MCP at consumption time. The
        heading-to-field gap resolves to space.numeral.s (= 8).
