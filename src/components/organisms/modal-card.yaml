authored_metadata: |
  component:
    id: modal-card
    name: Modal card
    type: organism


    purpose: >
      The white content block of a modal — presents an unavoidable action the
      user must take, with a fixed set of structures.


    usage: >
      Used as the content block inside a Modal sheet (Modal card + grey overlay).
      The agent selects the variant, then sets the allowed toggles.


    design_intent: >
      Force a clear, unavoidable decision at a break in the flow, presenting the
      required action (and any supporting detail) in a consistent, non-dismissible
      surface.


    anti_patterns:
      - id: not-standalone
        rule: >
          Do not use the Modal card on its own; it only exists inside a Modal
          sheet (paired with the grey overlay).
      - id: no-dismissal-affordance
        rule: >
          Do not add any dismissal affordance (cross, chevron, tap-outside-to-
          close). A modal must be acted upon and cannot be skipped.
      - id: no-invented-variants
        rule: Do not invent new variant structures; the set is locked.
      - id: download-list-scope
        rule: >
          Do not use the download-list variant for anything other than showing
          current downloads.


    composition:
      embedded:
        - name: Heading title
        - name: Content (subheading)
        - name: Content box
          note: Contains an inner small heading and special content.
        - name: Download-list variant contents
          note: Fixed structure.
      used_cta:
        - primary-cta-button
        - secondary-cta-button
        - link-cta
      excluded:
        - name: cross
          note: >
            Deliberate. A modal has no dismissal affordance, so no close atom.


    parts:
      - name: Heading title
        source: self-contained
      - name: Content (subheading)
        source: self-contained
      - name: Content box
        source: self-contained
        note: Special container; holds an inner small heading + special content.
      - name: CTAs
        source: cta-family
        note: Primary / Secondary / Link CTA, per the CTA toggles.


    variants:
      locked: true
      values:
        - name: default-modal
          description: >
            The main structure (heading, content, content box, CTAs) with the
            toggles defined below.
        - name: download-list-modal
          fixed_structure: true
          toggleable: false
          description: >
            Fixed, non-toggleable structure showing what is currently
            downloading (rows of label + progress + download indicator). Used
            only in that case.


    structure_default_modal:
      order:
        - heading
        - content
        - content-box
        - ctas


    toggles:
      applies_to: default-modal
      heading:
        states: [on]
        note: Always present; cannot be toggled off.
      content:
        states: [on, off]
        note: The subheading text under the heading.
      content_box:
        states: [on, off]
        inner_small_heading:
          states: [on, off]
          note: Meaningful only when the content box is on.
      ctas:
        individual_toggle: true
        count: [0, 1, 2, 3]
        note: Each of the three CTAs toggles independently on/off.


    rules:
      dismissal:
        - >
          No dismissal affordance of any kind (no cross, no chevron, no
          tap-outside-to-dismiss). The user must take an action.
      structure:
        - The heading is mandatory in the default modal.
        - >
          The variant structures are locked; the download-list variant's
          structure is fixed and non-toggleable.
      content_placement:
        - >
          Content vs Content box (strict): regular informational text — informing
          or telling the user something — goes in the content (subheading). The
          content box is a special container reserved for special/structured
          content: lists, steps, directions, feature lists, and the like.
          Informational prose -> content; structured/special content -> content box.
      composition_workflow:
        - >
          Agent order: choose the variant, then (for the default modal) set the
          content toggle, the content-box toggle and its inner small-heading
          toggle, and which of the three CTAs are present.
      usage_boundary:
        - >
          Use the Modal card (within a Modal sheet) when the action is unavoidable
          and cannot be skipped. For optional, skippable actions, use the Action
          card / Action sheet instead. (Mirror of the shared action-vs-modal rule.)


    relationships:
      - component_id: modal-sheet
        relation: content-of
        description: >
          The Modal card is the content block placed inside the Modal sheet
          (Modal card + grey overlay).
      - component_id: action-card
        relation: counterpart
        description: >
          Parallel counterpart for optional, skippable actions (see usage_boundary).


    visual_properties:
      source: figma_mcp
      note: >
        Exact values (corner radius, padding, width, colors) are not stored here.
        They are read live from Figma via MCP at consumption time.
