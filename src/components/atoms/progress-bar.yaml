authored_metadata: |
  component:
    id: progress-bar
    name: Progress bar
    type: atom


    purpose: >
      A horizontal progress bar with a content line beneath it, indicating the
      progress of an ongoing process.


    usage: >
      Used to show that a process is underway and how far along it is, with a
      short line of content describing it (e.g. "Transferring Firmware").


    design_intent: >
      Give ongoing processes a consistent, self-contained progress indicator with
      a description, so progress states read uniformly wherever they appear.


    anti_patterns:
      - id: no-hiding-parts
        rule: >
          Do not remove or hide any part; both the bar and the content line are
          always present.


    composition:
      embedded:
        - name: Progress bar
          note: Track + fill.
        - name: Content line
          note: Sits beneath the bar.
      note: All parts embedded/self-contained; no child components.


    rules:
      - id: nothing-toggles
        rule: Nothing toggles; both the bar and the content line are always present.
      - id: fill-is-mock
