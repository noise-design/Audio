authored_metadata: |
  component:
    id: heading-content-component
    name: Heading-content component
    type: atom


    usage:
      - Section introductions
      - Feature descriptions
      - Setting explanations
      - Empty states
      - Informational cards
      - List items
      - Preference descriptions


    design_intent: >
      Provide a consistent information hierarchy that helps users quickly
      understand a topic before reading supporting details.


    anti_patterns:
      - id: not-for-actionable-without-parent
        rule: >
          Do not use for actionable content without a parent interaction
          component.
      - id: no-multiple-support-levels
        rule: >
          Do not use when more than one level of supporting content is needed.
      - id: not-for-long-form
        rule: Do not use for long-form paragraphs.
      - id: not-for-status-communication
        rule: Do not use for status communication.


    rules:
      heading:
        - Should communicate the primary message.
        - Keep concise.
        - Prefer 1-3 words.
        - Maximum 2 lines.
      supporting_content:
        - Explains the heading.
        - Adds context or benefit.
        - Written in sentence form.
        - Maximum 2-3 lines.


