authored_metadata: |
  component:
    id: link-cta
    name: Link CTA
    type: atom
    reusable: true
    standalone: true


    purpose: >
      Text-only, underlined call-to-action for presenting inline links.


    usage: >
      Use for the lowest-emphasis actions or navigational links
      (e.g. UPDATE, Terms of Service, "Click here"). Typically appears below
      or alongside Primary/Secondary CTAs, or inline within body text.


    design_intent: >
      Provide a minimal, low-commitment action affordance that stays visually
      subordinate to button CTAs while remaining clearly tappable through
      underline styling.


    anti_patterns:
      - id: not-for-high-priority
        rule: >
          Do not use for primary or high-priority actions; it carries the
          least visual weight of the CTA family.
      - id: no-container-fill
        rule: >
          Do not give it a filled/button background; its distinction is being
          container-less text.


    variant_axes:
      state:
        - name: default
          interactive: true
          description: Single state only; Link CTA has no enabled/disabled/pressed distinction.
      usage:
        - name: regular
          context: L1/L2 screens
          description: Standard placement on regular screens.
        - name: bottom_sheet
          context: Bottom sheets and action sheets
          description: >
            Reduced width to fit within bottom sheets and action sheets.


    rules:
      - id: text-underlined
        rule: Text is underlined.
      - id: label-centered
        rule: Label is centered.
      - id: no-container
        rule: No container fill or border.
      - id: bottom-sheet-width
        rule: >
          Bottom-sheet usage variant is narrower than the regular variant
          to fit within bottom sheets and action sheets.


    relationships:
      - component_id: primary-cta-button
        relation: emphasis-family
        description: Highest-emphasis member of the CTA family.
      - component_id: secondary-cta-button
        relation: emphasis-family
        description: Mid-emphasis member of the CTA family.


