authored_metadata: |
  component:
    id: modal-sheet
    name: Modal sheet
    type: complex-organism
    type_note: An organism containing an organism or atom (the content variant).


    purpose: >
      The full modal surface — a grey dimming overlay with content anchored to
      the bottom — used to present an unavoidable action the user must take.


    usage: >
      Used when the user must complete an action they cannot skip. Follows the
      same container behavior as the Action sheet, except it is not freely
      dismissible.


    design_intent: >
      Force an unavoidable decision at a break in the flow, presenting the
      required action on a surface the user cannot casually dismiss.


    anti_patterns:
      - id: not-for-optional-actions
        rule: Do not use for optional, skippable actions; use the Action sheet instead.
      - id: no-internal-scroll
        rule: >
          Do not allow the content to scroll internally; the sheet grows to fit
          its content.
      - id: never-cover-status-bar
        rule: >
          Do not obscure or recolor the status bar with the overlay; the status
          bar stays on top in its dedicated contrasting token.
      - id: no-extra-dismissal
        rule: >
          Do not add a cross or any dismissal affordance beyond the ones each
          variant explicitly permits.


    composition:
      owned:
        - name: Grey dimming overlay
          note: Exact color/opacity read from Figma.
      content_variants:
        - modal-card
        - image-asset-placeholder (variant: device-native-pop-up)
      on_top:
        - name: Status bar
          note: Remains rendered on top of the overlay (see relationships).


    variants:
      locked: true
      values:
        - name: modal-card-variant
          contains:
            component_id: modal-card
          description: The Modal sheet contains the Modal card.
        - name: device-native-pop-up-variant
          contains:
            component_id: image-asset-placeholder
            pinned_variant: device-native-pop-up
          description: >
            The Modal sheet contains the image-asset-placeholder atom,
            specifically its device-native-pop-up variant. Pinned: no other
            variant of the atom is used here.


    rules:
      placement:
        - >
          The sheet is anchored (stuck) to the bottom of the screen and grows
          upward to fit its content.
      scroll:
        - >
          The content must never scroll; height is content-driven and expands
          upward instead.
      motion:
        - >
          Enters from the bottom (slides up) and exits to the bottom (slides
          down), with the overlay fading accordingly. Smooth animation.
      status_bar:
        - >
          Stays on top of the overlay in a contrasting color drawn from its
          dedicated token; the overlay never covers or recolors it.
      dismissal:
        - variant: modal-card-variant
          rule: >
            Dismissible only via the actions (the Modal card's CTAs). No
            overlay-tap, no swipe-down, no cross.
        - variant: device-native-pop-up-variant
          rule: >
            Dismissible only by tapping outside the placeholder, or by choosing
            one of the options inside the native pop-up. These are the only two
            ways. This follows the device's own native pop-up conventions, not
            ours.
      usage_boundary:
        - >
          Use the Modal sheet when the action is unavoidable and cannot be
          skipped. For optional, skippable actions, use the Action sheet.
          (Mirror of the shared action-vs-modal rule.)


    relationships:
      - component_id: modal-card
        relation: contains
        description: Content of the Modal card variant.
      - component_id: image-asset-placeholder
        relation: contains
        pinned_variant: device-native-pop-up
        description: >
          Content of the Device native pop up variant; pinned to that specific
          atom variant.
      - component_id: action-sheet
        relation: counterpart
        description: Parallel counterpart for optional, skippable actions (see usage_boundary).
      - component_id: status-bar
        relation: renders-on-top
        description: >
          Stays rendered on top of the overlay in its dedicated contrasting token.


    visual_properties:
      source: figma_mcp
      note: >
        Exact values (overlay color/opacity, corner radius, spacing, dimensions)
        are not stored here. They are read live from Figma via MCP at consumption
        time.
