authored_metadata: |
  component:
    id: actionables
    name: Actionables
    type: molecule


    usage: >
      Provide a consistent trailing action area for organism level components.


    design_intent: >
      Provide a unified interaction slot that allows different interaction
      patterns to be substituted without affecting content structure, spacing,
      or hierarchy.


    supported_variants:
      - toggle
      - checkbox
      - radio-button
      - chevron
      - cross


    composition:
      used_atoms:
        - chevron
        - toggle
        - checkbox
        - cross
        - radio-button


    rules:
      - id: single-actionable-per-row
        rule: Only one actionable may exist within a row.
      - id: swap-no-layout-shift
        rule: Swapping actionable variants must not affect content layout.
      - id: inherit-vertical-alignment
        rule: Actionables inherit the parent component's vertical alignment.
      - id: visually-secondary-to-content
        rule: Actionables should remain visually secondary to content.
      - id: consistent-touch-targets
        rule: Actionables must preserve consistent touch targets across variants.


    visual_properties:
      source: figma_mcp
      note: >
        Exact values (corner radius, padding, width, colors) are not stored here.
        They are read live from Figma via MCP at consumption time.
