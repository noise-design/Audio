authored_metadata: |
  component:
    id: card-heading
    name: Card heading
    type: atom


    purpose: >
      A section heading that labels a group of cards or a categorized set of
      items.


    usage: >
      Used to categorize features or parts — a heading placed above a bunch of
      cards or a categorized group (e.g. labeling a set of Master cards). The
      label text is always present; the trailing count can be shown or hidden.


    design_intent: >
      Give grouped or categorized cards a consistent section label so users can
      scan and distinguish one category of items from another.


    anti_patterns:
      - id: not-a-card-title
        rule: >
          Do not use inside a card as its title; that is the heading-content
          component's role. Card heading labels a group of cards; heading-content
          sits within a single card.
      - id: only-for-categorization
        rule: Do not use for content that isn't a category or section grouping.


    composition:
      embedded:
        - name: Label text
          note: The category/section name; always present.
        - name: Trailing numeric
          note: Count indicator on the trailing end; toggleable.


    toggles:
      trailing_numeric:
        states: [on, off]
        note: >
          A count indicator (e.g. "1/2"); its exact meaning is set by the context
          that uses it.


    rules:
      - id: label-always-present
        rule: The label text is always present.
      - id: numeric-is-count
        rule: The trailing numeric indicates a count.
      - id: use-cases-owned-elsewhere
        rule: >
          Use cases are not documented here beyond "categorize features or
          parts"; the specific categories are defined by whatever uses this
          heading.
      - id: not-inside-a-card
        rule: >
          Card heading labels a group of cards; it is never used as the title
          inside a single card (that is the heading-content component).


    relationships:
      - component_id: heading-content-component
        relation: distinct-sibling
        description: >
          Heading-content sits inside a card; Card heading labels a group of
          cards. Do not substitute one for the other.


    visual_properties:
      source: figma_mcp
      note: >
        Exact values (typography, spacing, colors) are not stored here. They are
        read live from Figma via MCP at consumption time.
