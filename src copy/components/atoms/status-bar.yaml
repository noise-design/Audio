authored_metadata: |
  component:
  id: status-bar
  name: Status bar
  type: atom


  usage: >
  Used at the top of every screen as the highest hierarchy level in the
  interface.


  design_intent: >
  Provides a dedicated region for operating system information while
  establishing the starting point of the application hierarchy.


  anti_patterns:
  - id: no-app-content-inside
  rule: Do not place application content inside the status bar.
  - id: not-for-navigation
  rule: Do not use for navigation.
  - id: not-for-page-titles
  rule: Do not use for page titles.
  - id: not-for-actions-or-controls
  rule: Do not use for actions or controls.
  - id: not-removable
  rule: Do not remove from standard application screens.


  rules:
  hierarchy:
  - Represents L0 hierarchy.
  - Must always appear above L1 navigation.
  - Must always appear above page content.
  placement:
  - Must remain fixed at the top of the screen.
  - Must be the first visible component in the page structure.
  content_ownership:
  - System information is owned by the operating system.
  - Application content must not occupy this region.


  visual_properties:
  source: figma_mcp
  note: >
  Exact values (corner radius, padding, width, colors) are not stored here.
  They are read live from Figma via MCP at consumption time.

  rules:
      scroll_state:
        - >
          During the L1 inner page navigation's scrolled state, the status bar
          container receives a token/background/canvas fill (it is otherwise
          transparent). This behavior is owned/driven by
          l1-inner-page-navigation.


    relationships:
      - component_id: l1-inner-page-navigation
        relation: shares-scroll-state
        description: >
          Drives the status bar's canvas fill during its scrolled state.
