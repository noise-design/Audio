<div class="nds-checkbox-card-group">

  <!-- position=checkbox Left: selectable AND removable -->

        <p class="nds-heading-content__heading">Downloaded item</p>
        <p class="nds-heading-content__body">Select to manage or remove this item</p>
      </div>
    </div>
    <span class="nds-checkbox-card__remove">
      <span class="nds-cross" role="button" aria-label="Remove" tabindex="0">

          <path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

      </span>

  </div>

  <!-- position=checkbox Right: selection is the only action -->
  <div class="nds-checkbox-card">
    <div class="nds-checkbox-card__cluster">
      <div class="nds-heading-content">
        <p class="nds-heading-content__heading">Saved recording</p>

    </div>

</div>
