authored_metadata: |
  component:
    id: l1-inner-page-navigation
    name: L1 inner page navigation
    type: organism


    usage: >
      Used at the L1 inner pages layer to communicate page context and provide
      access to navigation and page-specific actions.


    design_intent: >
      Provide users with clear orientation within an inner-page flow while
      maintaining access to navigation and contextual actions.


    anti_patterns:
      - id: not-on-surface-level
        rule: Do not use on surface-level pages.
      - id: not-inside-containers
        rule: Do not use inside cards or content containers.
      - id: not-more-than-once
        rule: Do not use more than once on a page.
      - id: not-as-section-header
        rule: Do not use as a section header.
      - id: not-for-content-grouping
        rule: Do not use for content grouping.
      - id: not-replace-l2-headings
        rule: Do not replace L2 page headings.


    composition:
      used_atoms:
        - chevron
        - cross


    variant_axis:
      name: state
      base_variants:
        heading_capable: true
        heading_toggle: [on, off]
        values:
          - name: clean-only-chevron
            figma_value: Clean-Only Chevron
            contains:
              - Leading Back Action
          - name: one-icon
            figma_value: One icon
            contains:
              - Leading Back Action
              - One Trailing Action
          - name: two-icon
            figma_value: two icon
            contains:
              - Leading Back Action
              - Two Trailing Actions
          - name: heading
            figma_value: Heading
            role: example
            note: >
              Reference/example state showing a base variant with heading on:
              leading back action + centered heading + trailing config.
              Illustrates how the promoted heading looks and sits in the
              centered slot. Not a distinct structural variant.
      standalone_variants:
        heading_capable: false
        values:
          - name: ai-token-banner
            figma_value: AI Token Banner
            contains:
              - Leading Back Action
              - AI Credit Indicator
              - Trailing Action
            note: No space for a heading; scroll/heading-push case does not exist.
          - name: items-selected
            figma_value: Items Selected
            contains:
              - Close Action
              - Selection Count
              - Contextual Actions
            note: No heading; scroll/heading-push case does not exist.


    parts:
      - name: Leading Back Action
        source: atom
        atom: chevron
        note: Back-direction chevron.
      - name: Close Action
        source: atom
        atom: cross
      - name: Page Title / Heading
        source: self-contained
        note: Plain text owned by this organism.
      - name: Trailing Action
        source: self-contained
      - name: AI Credit Indicator
        source: self-contained
      - name: Selection Count
        source: self-contained
      - name: Contextual Actions
        source: self-contained


    rules:
      hierarchy:
        - Must represent L1 page hierarchy.
        - Must always appear below the status bar.
        - Must always appear above page content.
      variant_selection:
        - Choose the simplest variant capable of supporting required actions.
        - Do not add trailing actions unless a clear user need exists.
        - Items Selected should only appear during active selection states.
      layout:
        - Must span the page width.
        - Title remains the primary focal element.
        - Navigation actions should remain visually secondary to the page title.
      scroll_behavior:
        - >
          On scroll (when page content overflows the first fold), receives the
          promoted heading from the L2/Inner pages Heading into its centered
          slot. Applies only to base variants (clean-only-chevron, one-icon,
          two-icon); ai-token-banner and items-selected never receive a heading.
        - >
          On scroll, the L1 nav container and the status bar container gain a
          fill of token/background/canvas (both are transparent at rest) so
          scrolling content does not bleed through.
        - >
          On scroll, a subtle drop shadow appears on the L1 nav. The shadow is
          directional: cast downward only, from the bottom edge of the L1 nav,
          so it reads as content passing underneath. It must never extend upward
          onto the status bar.
        - The transition is a smooth animation, and reverses on scroll-down.
      shadow_exception:
        - >
          This is the only component in the system that uses a drop shadow.
          Shadows must not be introduced anywhere else in the app.


    relationships:
      - component_id: l2-inner-pages-heading
        relation: heading-source
        description: Supplies the promoted heading on scroll.
      - component_id: status-bar
        relation: shares-scroll-state
        description: >
          Also receives the token/background/canvas fill during this
          component's scrolled state.


    visual_properties:
      source: figma_mcp
      note: >
        Exact values (corner radius, padding, width, height, colors) are not
        stored here. They are read live from Figma via MCP at consumption time.
