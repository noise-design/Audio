authored_metadata: |
  component:
    id: secondary-cta-button
    name: Secondary CTA Button
    type: atom
    reusable: true
    standalone: true


    purpose: >
      Lower-emphasis call-to-action button for supporting or alternative actions.


    usage: >
      Use for actions that are available but not the primary path
      (e.g. Forget this device, Cancel, Skip). Often paired alongside
      a Primary CTA.


    design_intent: >
      Offer users a clear secondary choice without competing for attention
      with the primary action, preserving a single obvious action hierarchy
      per screen.


    anti_patterns:
      - id: not-for-main-action
        rule: >
          Do not use for the main action on a screen; that role belongs
          to the Primary CTA.
      - id: no-higher-weight-than-primary
        rule: >
          Do not place a Secondary CTA with higher visual weight than the
          Primary CTA in the same view.


    variant_axes:
      state:
        - name: enabled
          interactive: true
          description: Default interactive state; the action is available.
        - name: disabled
          interactive: false
          description: Action is currently unavailable; not interactive.
        - name: pressed
          interactive: true
          transient: true
          description: >
            Transient state shown at the moment of tap, while the button
            is being activated.
      usage:
        - name: regular
          context: L1/L2 screens
          description: Standard placement on regular screens; full width.
        - name: bottom_sheet
          context: Bottom sheets and action sheets
          description: >
            Reduced width to fit within bottom sheets and action sheets.


    rules:
      - id: shape-pill
        rule: Pill shape (fully rounded corners).
      - id: label-single-line
        rule: Label is single-line, centered.
      - id: bottom-sheet-width
        rule: >
          Bottom-sheet usage variant is narrower than the regular variant
          to fit within bottom sheets and action sheets.


    relationships:
      - component_id: primary-cta-button
        relation: emphasis-counterpart
        description: >
          Higher-emphasis counterpart. Secondary CTA is the lower-priority
          pairing option in the same action hierarchy.


    visual_properties:
      source: figma_mcp
      note: >
        Exact values (corner radius, padding, width, colors) are not stored here.
        They are read live from Figma via MCP at consumption time.


    metadata_governance:
      source_of_truth: this_yaml
      human_readable: generated_on_demand
      note: >
        Human-readable metadata is not stored separately. It is reconstructed
        from this file to guarantee a single source of truth and prevent drift.
