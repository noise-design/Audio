authored_metadata: |
  component:
    id: checkbox-card
    name: Checkbox card
    type: organism


    usage: >
      Used for multi-selection lists where users can select and optionally
      remove items.


    design_intent: >
      Provide a scalable and consistent pattern for presenting selectable items
      while maintaining clear information hierarchy and selection visibility.


    anti_patterns:
      - id: no-standalone-card
        rule: Do not use as a standalone card.
      - id: no-outside-list
        rule: Do not use outside a list structure.
      - id: no-radio-or-toggle
        rule: Do not combine with radio buttons or toggles.
      - id: not-for-navigation
        rule: Do not use for navigation patterns.


    composition:
      used_molecules:
        - actionables
      used_atoms:
        - cross
        - heading-content-component


    variants:
      - name: checkbox-left
        contains:
          - checkbox-actionable-molecule
          - heading-content-atom
          - cross-atom
        usage: Use when items can be selected and independently removed.
      - name: checkbox-right
        contains:
          - checkbox-actionable-molecule
          - heading-content-atom
        usage: Use when item selection is the only required action.


    rules:
      list_structure:
        - Must always exist within a list.
        - Must never be used as an isolated card.
        - Multiple items must be grouped inside a parent frame.
      parent_frame:
        - Follow Master Card construction principles.
        - Apply surface color token on the parent frame.
        - Apply 18px corner radius on the parent frame.
        - Parent frame must always have 12px top padding.
        - Parent frame must always have 12px bottom padding.
        - Parent frame should not have any internal spacing between the elements.


    visual_properties:
      source: figma_mcp
      note: >
        Exact values (corner radius, padding, width, colors) are not stored here.
        They are read live from Figma via MCP at consumption time.
