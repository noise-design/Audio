authored_metadata: |
  component:
    id: image-asset-placeholder
    name: Image / asset placeholder
    type: atom


    purpose: >
      A placeholder standing in for an image or asset, in a fixed set of sizes,
      plus mock stand-ins for a device-native pop-up and a transcribing/loading
      state.


    usage: >
      Used wherever a design needs a placeholder for an image, avatar, device
      mock, native pop-up, or loading state. Because these are raw primitives,
      the specific use case for any variant is defined by the organism or
      molecule that uses it — not here.


    design_intent: >
      Provide a consistent, fixed library of placeholders so any design can
      represent images, assets, device mocks, native pop-ups, and loading states
      uniformly, without bespoke placeholder sizes.


    anti_patterns:
      - id: no-resize
        rule: Do not change the placeholder sizes; the size set is fixed and locked.
      - id: native-popup-is-mock-only
        rule: >
          Do not use the device-native-pop-up variant to build real OS pop-ups;
          it is only a mock stand-in (the library does not reproduce native
          pop-ups).


    variants:
      locked: true
      note: Sizes cannot be changed.
      values:
        - name: xs
          shape: circle
          description: Circular avatar placeholder. Carries an optional profile icon.
        - name: s
          shape: rectangle
          description: Small rectangular placeholder.
        - name: n
          shape: rectangle
          description: Placeholder with a rule-of-thirds grid overlay.
        - name: m
          shape: rectangle
          description: Large rectangular placeholder.
        - name: device-native-pop-up
          mock: true
          description: >
            A mock stand-in for a native OS pop-up (e.g. a system prompt to turn
            on Bluetooth). Not a real pop-up; a placeholder representing one.
        - name: transcribing-loading-pop-up
          description: Placeholder for a transcribing/loading state.


    toggles:
      xs_profile_icon:
        applies_to: xs
        states: [on, off]
        note: >
          On the Size XS (circular avatar) variant, the profile icon can be shown
          or hidden per the requirement.


    rules:
      - id: sizes-locked
        rule: >
          The six sizes/variants are fixed and locked; the agent selects among
          them but never resizes or creates new ones.
      - id: shape-lock
        rule: >
          Size XS is circular (avatar); the rule-of-thirds grid belongs to the N
          variant.
      - id: use-cases-owned-elsewhere
        rule: >
          Use cases are not documented on this component; they are owned by
          whatever organism or molecule uses the placeholder.
      - id: native-popup-mock
        rule: The device-native-pop-up variant is a mock representation only.


    ai_metadata:
      - >
        The designer may ask the agent to display the different placeholder
        variants within a design, so options can be compared visually.


    visual_properties:
      source: figma_mcp
      note: >
        Exact values (dimensions, corner radius, colors) are not stored here.
        They are read live from Figma via MCP at consumption time.
