authored_metadata: |
  component:
    id: l1-home-page-navigation
    name: L1/Home page navigation
    type: organism


    purpose: >
      Top-level (L1) navigation used on surface-level pages, providing device
      switching and quick access to download activity and the store.


    usage: >
      Used as the L1 navigation on surface-level pages only: homepage,
      settings page, and Noise AI page.


    design_intent: >
      Give users a consistent home-level anchor for switching active devices and
      reaching high-frequency destinations (downloads, store) without competing
      with page content.


    anti_patterns:
      - id: not-on-inner-pages
        rule: >
          Do not use on inner pages (any page one layer deeper, reached by
          tapping into a feature); inner pages use L1 inner page navigation
          instead.
      - id: not-more-than-once
        rule: Do not use more than once on a page.


    variants: none


    parts:
      - name: Device switcher
        source: component
        linked: false
        note: Component-backed; not linked in this test run.
      - name: Download process icon
        source: self-contained
      - name: Store bag icon
        source: self-contained
        note: Entry point to the store/shop.


    rules:
      placement:
        - Must represent L1 page hierarchy.
        - Must always appear below the status bar.
        - Must always appear above page content.
        - >
          May only appear on surface-level pages: homepage, settings, and
          Noise AI page.


    relationships:
      - component_id: l1-inner-page-navigation
        relation: sibling
        description: >
          Inner-page counterpart at the same L1 level. This component is
          home-only; the counterpart is inner-page-only.


    constraints:
      allowed_pages:
        - homepage
        - settings
        - noise-ai


    visual_properties:
      source: figma_mcp
      note: >
        Exact values (corner radius, padding, width, height, colors) are not
        stored here. They are read live from Figma via MCP at consumption time.
