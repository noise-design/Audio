authored_metadata: |
  component:
    id: toggle
    name: Toggle
    type: atom


    usage: >
      Used for immediate on/off settings that can be changed without leaving
      the current screen.


    design_intent: >
      Allow users to modify a binary system state directly from the current
      context.


    anti_patterns:
      - id: not-when-confirmation-required
        rule: Do not use when confirmation is required.
      - id: not-for-navigation
        rule: Do not use for navigation.
      - id: not-for-multi-selection
        rule: Do not use for multi-selection.


    states:
      - on
      - off
      - disabled


    rules:
      - id: reflect-actual-system-state
        rule: Toggle state should reflect the actual system state.
      - id: immediate-state-change
        rule: State changes should occur immediately after interaction.
      - id: row-tap-no-navigation
        rule: Row tap should not trigger navigation.


