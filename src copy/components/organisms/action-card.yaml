authored_metadata: |
  component:
    id: action-card
    name: Action card
    type: organism


    purpose: >
      The white content block of an action sheet — presents a set of options or
      an input the user can act on, with a locked set of content structures.


    usage: >
      Used as the content block inside an Action sheet (Action card + grey
      overlay). The agent first selects the variant structure that fits the
      content, then sets the header and button toggles.


    design_intent: >
      Provide a single, consistent surface for optional, skippable actions and
      selections, with a fixed library of content structures so
      option-presentation stays uniform across the app.


    anti_patterns:
      - id: not-standalone
        rule: >
          Do not use the Action card on its own; it only exists inside an Action
          sheet (paired with the grey overlay).
      - id: no-invented-variants
        rule: Do not invent new variant structures; the set is locked.
      - id: find-my-earbuds-scope
        rule: >
          Do not use the find-my-earbuds variant outside the Find My Earbuds case.


    composition:
      embedded:
        - name: Header title
          note: Owned by this component; not a child.
      used_atoms:
        - cross
      used_molecules:
        - actionables
      used_cta:
        - primary-cta-button
        - secondary-cta-button
        - link-cta


    parts:
      - name: Header title
        source: self-contained
        note: Embedded in this component; owned here.
      - name: Close
        source: atom
        atom: cross
        note: Always present; never toggles off.
      - name: Selection rows
        source: molecule
        molecule: actionables
        note: >
          Linked to Actionables so the trailing control can be radio, checkbox,
          toggle, chevron, etc. as the case requires.
      - name: Bottom buttons
        source: cta-family
        note: Primary / Secondary / Link CTA, per the button toggle.


    variants:
      locked: true
      values:
        - name: categorized-list
          description: Heading/subheading + options grouped under category labels.
        - name: list
          description: Options listed flat, without categorization.
        - name: single-option-card
          description: >
            Two distinct option chunks (one chunk + another), e.g. providing
            given options or contact numbers.
        - name: calendar-card
          description: Date selection via a calendar.
        - name: year-card
          description: Year selection.
        - name: month-card
          description: Month selection.
        - name: profile-picture-card
          description: Two-option structure (e.g. take a photo / upload from gallery).
        - name: find-my-earbuds-card
          standalone: true
          description: Standalone card; used only in the Find My Earbuds case.


    toggles:
      shared_by_all_variants: true
      heading:
        states: [on, off]
        content:
          states: [on, off]
          note: >
            Content (subheading) is only meaningful when the heading is on.
      bottom_buttons:
        count: [0, 1, 2, 3]
        source: cta-family
        note: Chosen from Primary / Secondary / Link CTA.


    rules:
      structure:
        - The Cross (X) is always present and never toggles off.
        - >
          The variant structures are locked; the agent selects among them but
          never creates new ones.
        - Body content varies by variant and case; sample content is not final.
      composition_workflow:
        - >
          Agent order: first choose the variant structure that fits the content,
          then set the heading/content toggle, then set the number and type of
          bottom buttons.
      usage_boundary:
        - >
          Use the Action card (within an Action sheet) when the action is
          optional and skippable (e.g. upload a profile image, set a birthday).
          For unavoidable actions the user cannot skip, use the Modal card /
          Modal sheet instead. (Mirror of the shared action-vs-modal rule.)


    relationships:
      - component_id: action-sheet
        relation: content-of
        description: >
          The Action card is the content block placed inside the Action sheet
          (Action card + grey overlay).
      - component_id: modal-card
        relation: counterpart
        description: >
          Parallel counterpart for unavoidable actions (see usage_boundary).


    visual_properties:
      source: figma_mcp
      note: >
        Exact values (corner radius, padding, width, colors) are not stored here.
        They are read live from Figma via MCP at consumption time.
