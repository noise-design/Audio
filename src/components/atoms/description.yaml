authored_metadata: |
  component:
    id: description
    name: Description
    type: atom


    purpose: >
      A block of descriptive or disclaimer text.


    usage: >
      Used in one of two placements — beneath a card as that card's description,
      or at the bottom above a CTA as a disclaimer (e.g. "if you turn on this
      feature, you must turn off the others"). Used to describe a card or feature,
      or to state a disclaimer.


    design_intent: >
      Provide a consistent way to attach explanatory or disclaimer text to a
      card, feature, or action, separate from headings, so supplementary
      information reads uniformly wherever it appears.


    anti_patterns:
      - id: not-a-heading
        rule: >
          Do not use as a heading or a title; it is supplementary text, not a
          heading. Headings are the heading-content component and the Card
          heading.


    rules:
      - id: placements
        rule: >
          Two placements: (1) under a card, as the card's description; (2) at the
          bottom above a CTA, as a disclaimer.
      - id: container-padding
        rule: The text lives inside its container and respects the container's padding values.
      - id: content-driven
        rule: Content is fully content-driven; exact values come from Figma.


    relationships:
      - component_id: heading-content-component
        relation: distinct
        description: >
          Heading-content is a title + supporting content inside a card;
          Description is standalone supplementary/disclaimer text. Do not
          substitute.
      - component_id: card-heading
        relation: distinct
        description: >
          Card heading labels a group of cards; Description is supplementary
          text, not a heading. Do not substitute.


    visual_properties:
      source: figma_mcp
      note: >
        Exact values (typography, spacing, colors) are not stored here. They are
        read live from Figma via MCP at consumption time.
